<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="style.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body class="rr">
    <h1>our Registration page</h1>
    <form action="" method="">
    <div>
        <nav >
            <a href="index.html">home</a>&nbsp;&nbsp;
            <a href="team.html">team</a>&nbsp;&nbsp;
            <a href="Registration.html">register</a>&nbsp;&nbsp;
            <a href="contact.html">contact</a>
        </nav>
    </div>
    <br>
    <br>
    <fieldset class="A1">
        <legend>Registration form</legend>
        <p>
            <label for="fullname">Full Name</label><br>
            <input type="text" name="fullname" id="fullname" placeholder="enter your full name">
        </p>
        <p>
            <label for="username">username</label><br>
            <input type="text" name="username" id="username" placeholder="enter username">
        </p>
        <p>
            <label for="address">Address</label><br>
            <input type="text" name="address" id="address" placeholder="entr your address">
        </p>
        <P>
            <label for="email">Email</label><br>
            <input type="text" name="email" id="email" placeholder="enter email">
        <p>
            <label for="mopile">Mopile</label><br>
            <input type="tell" name="mopile" id="mopile" placeholder="enter mopile" maxlength="10"
            minlength="10">
        </p>
        </fieldset>
        <fieldset class="A1">
            <legend>choose your  gender</legend>
        <p>
            <label for="">use your gender</label><br>
            <input type="radio" name="gender" id="male">
            <label for="male">male</label><br>
            <input type="radio" name="gender" id="female">
            <label for="female">female</label>
        </p>
        </fieldset>
        <fieldset class="A1">
            <legend>TechNova solutions company </legend>
        <p>
            <label for="choose your favorite job"> Choose your favorite job:</label><br>
            <input type="checkbox" name="photographic" id="photographic">
            <label for="photographic">photographic</label><br>
            <input type="checkbox" name="social " id="social ">
            <label for="social "> social media marketing</label><br>
            <input type="checkbox" name="creates " id="creates ">
            <label for="creates "> creates modern websites</label><br>
            <input type="checkbox" name="developer" id="developer">
            <label for="developer">develops online system</label><br>
            <input type="checkbox" name="business" id="business">
            <label for="business">business promotion</label><br>
            <input type="checkbox" name="others" id="others">
            <label for="others">others</label>
        </p>
        </fieldset>
        <p class="center">
            <input type="reset" name="reset" value="clear form">
        </p>
</body>
</html>
